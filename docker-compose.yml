version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: coreinventory-db
    environment:
      POSTGRES_USER: ${DB_USER:-core}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-corepassword}
      POSTGRES_DB: ${DB_NAME:-coreinventory}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-core} -d ${DB_NAME:-coreinventory}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: coreinventory-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
